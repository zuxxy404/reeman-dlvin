<!DOCTYPE html>
<html lang="ckb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بۆ دلڤینەکەم</title>
    
    <!-- لێرەدا ئایکۆنی وێبسایتەکە (Favicon) ڕێکخراوە بەو بەستەرەی ناردووتە -->
    <link rel="icon" type="image/png" href="https://imguser.free.nf/uploads/0_1782844069_6a440aa5455ab_Pngtreeletterdwithredheart_5861024.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
            color: #ffffff;
            
            /* ڕوونی و جوانی وێنەی باکگراوندەکەت لێرەدا پارێزراوە */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('https://imguser.free.nf/uploads/0_1782843498_6a44086aac21a_download.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        /* کاردی ناوەڕاست - شوشەیەکی زۆر ڕوون بۆ ئەوەی وێنەی پشتەوە بە جوانی دیار بێت */
        .glass-card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 520px;
            
            background: rgba(10, 6, 18, 0.35); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 24px;
            
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: scale(1.01);
            border-color: rgba(255, 75, 110, 0.4);
        }

        .center-heart {
            font-size: 3.5rem;
            color: #ff4b6e;
            animation: pulse 1.5s infinite alternate;
            margin-bottom: 15px;
            display: inline-block;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(255,75,110,0.5)); }
            100% { transform: scale(1.15); filter: drop-shadow(0 0 25px rgba(255,75,110,0.9)); }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.8), 0 0 10px rgba(255, 75, 110, 0.5);
            margin-bottom: 25px;
            direction: rtl;
        }

        .counter-title {
            font-size: 1.05rem;
            color: #ffb3c6;
            margin-bottom: 20px;
            direction: rtl;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            font-weight: 500;
        }

        .counter-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 35px;
            direction: ltr;
        }

        .count-box {
            background: rgba(255, 75, 110, 0.15);
            border: 1px solid rgba(255, 75, 110, 0.35);
            padding: 14px 5px;
            border-radius: 14px;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .count-box:hover {
            background: rgba(255, 75, 110, 0.25);
            border-color: rgba(255, 75, 110, 0.6);
            transform: translateY(-3px);
        }

        .count-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: #ffffff;
            display: block;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }

        .count-label {
            font-size: 0.85rem;
            color: #ffffff;
            margin-top: 6px;
            display: block;
            direction: rtl;
            font-weight: 500;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .quote-container {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 25px;
            min-height: 85px;
            direction: rtl;
        }

        .kurdish-quote {
            font-size: 1.35rem;
            color: #ffe6eb;
            line-height: 1.7;
            font-weight: 500;
            text-shadow: 0 2px 8px rgba(0,0,0,0.9);
            transition: opacity 0.5s ease;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="center-heart">❤️</div>
        <h1>خۆشم دەوێیت دلڤین</h1>
        
        <div class="counter-title">کاتەکانی ژیانم لەگەڵ تۆ:</div>
        <div class="counter-grid">
            <div class="count-box">
                <span class="count-value" id="days">00</span>
                <span class="count-label">ڕۆژ</span>
            </div>
            <div class="count-box">
                <span class="count-value" id="hours">00</span>
                <span class="count-label">کاتژمێر</span>
            </div>
            <div class="count-box">
                <span class="count-value" id="minutes">00</span>
                <span class="count-label">خولەک</span>
            </div>
            <div class="count-box">
                <span class="count-value" id="seconds">00</span>
                <span class="count-label">چرکە</span>
            </div>
        </div>

        <div class="quote-container">
            <p class="kurdish-quote" id="kuQuote">تۆ جوانترین دیاری خوای بۆ ژیانی من.</p>
        </div>
    </div>

    <script>
        // ڕێکەوتی دەستپێکردن: ١٠ی ٣ی ٢٠٢٦
        const targetDate = new Date("2026-03-10T00:00:00").getTime();

        function updateCounter() {
            const now = new Date().getTime();
            const difference = now - targetDate;

            if (difference > 0) {
                const d = Math.floor(difference / (1000 * 60 * 60 * 24));
                const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById("days").innerText = d;
                document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
                document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
                document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
            } else {
                document.getElementById("days").innerText = "0";
                document.getElementById("hours").innerText = "00";
                document.getElementById("minutes").innerText = "00";
                document.getElementById("seconds").innerText = "00";
            }
        }

        setInterval(updateCounter, 1000);
        updateCounter();

        // وتەکان بۆ دلڤین
        const loveQuotes = [
            "تۆ جوانترین دیاری خوای بۆ ژیانی من.",
            "ژیان بێ تۆ چرکەیەکی بێ مانایە.",
            "هەتا دوایین لێدانی دڵم خۆشم دەوێیت دلڤین.",
            "تۆ مانای ڕاستەقینەی بەختەوەری منیت.",
            "لە هەموو دونیا تەنها تۆ شک دەبەم."
        ];

        let quoteIndex = 0;
        setInterval(() => {
            const quoteElem = document.getElementById("kuQuote");
            quoteElem.style.opacity = 0;
            setTimeout(() => {
                quoteIndex = (quoteIndex + 1) % loveQuotes.length;
                quoteElem.innerText = loveQuotes[quoteIndex];
                quoteElem.style.opacity = 1;
            }, 500);
        }, 5000);
    </script>
</body>
</html>
